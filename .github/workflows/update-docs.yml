# Updates to gh-pages only happen with a direct push to main or a PR merge.
#
# When a pull request is opened/updated docs will build (but not publish) to
# verify that the PR does not break anything.
name: Build and publish docs

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build-docs:
    name: Build docs with mkdocs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.8"

      - name: Install tigrqc
        run: uv sync --locked --group docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  publish-docs:
    name: Update gh-pages branch
    needs: build-docs
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
