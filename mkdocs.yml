site_name: TIGRQC
site_url: https://tigrlab.github.io/tigrqc/
theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.tabs
    - navigation.top
    - search.highlight

validation:
  links:
    unrecognized_links: ignore

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_toc_entry: false
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
  - gen-files:
      scripts:
        - docs/mkdocs_gen.py
  - literate-nav:
      nav_file: navigation.md

markdown_extensions:
  - pymdownx.highlight:
      auto_title: true
      use_pygments: true
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
